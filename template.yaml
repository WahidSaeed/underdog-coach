AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Underdog Coach - agentic football tactics trainer.
  API Gateway -> Lambda (FastAPI via Mangum) -> Strands agents on Bedrock,
  with a DynamoDB table for per-session coaching progress.

Parameters:
  Stage:
    Type: String
    Default: dev
    Description: API Gateway stage name
  BedrockModelId:
    Type: String
    Default: REPLACE_WITH_BEDROCK_MODEL_ID
    Description: >
      Bedrock model id the Strands agents will call. Confirm the exact
      id for your region/access in the Bedrock console model catalog
      before deploying - don't rely on the placeholder default.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12
    Architectures: [x86_64]

Resources:

  UnderdogCoachApi:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: main.handler
      Environment:
        Variables:
          SESSION_TABLE: !Ref SessionTable
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
      Events:
        ProxyRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: ["GET", "POST", "OPTIONS"]
        AllowHeaders: ["content-type"]

  SessionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH

Outputs:
  ApiUrl:
    Description: Base URL for the Underdog Coach API
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  SessionTableName:
    Description: DynamoDB table storing per-session coaching progress
    Value: !Ref SessionTable
