AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Underdog Coach - agentic football tactics trainer.
  API Gateway -> Lambda (FastAPI via Mangum) -> Strands agents on Bedrock,
  with a DynamoDB table for per-session coaching progress.

Parameters:
  BedrockModelId:
    Type: String
    Default: REPLACE_WITH_BEDROCK_MODEL_ID
    Description: >
      Bedrock model id the Strands agents will call. Confirm the exact
      id for your region/access in the Bedrock console model catalog
      before deploying - don't rely on the placeholder default.
  ScenarioAgentRuntimeArn:
    Type: String
    Default: ""
    Description: >
      ARN of the Scenario agent's Bedrock AgentCore Runtime deployment
      (see agentcore/, deployed separately via `agentcore deploy`). Empty
      default means the Match Director runs the Scenario agent in-process
      instead of calling out to AgentCore Runtime.

Globals:
  Function:
    # API Gateway HTTP API's own integration timeout is a hard ~29-30s,
    # so this Timeout can't save a slow request from a client-visible
    # 504 - it only protects against the Lambda dying mid-flight after
    # API Gateway has already given up.
    Timeout: 60
    MemorySize: 1024
    Runtime: python3.12
    Architectures: [x86_64]

Resources:

  UnderdogCoachApi:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: main.handler
      Environment:
        Variables:
          SESSION_TABLE: !Ref SessionTable
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          SCENARIO_AGENT_RUNTIME_ARN: !Ref ScenarioAgentRuntimeArn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
            - Effect: Allow
              Action:
                - bedrock-agentcore:InvokeAgentRuntime
              # Scoped to "*" for hackathon speed rather than the specific
              # runtime ARN - tighten this before any non-demo deployment.
              Resource: "*"
      Events:
        ProxyRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # $default (not a named stage like "dev") so the invoke URL has no
      # stage path segment - a named stage would prefix every request path
      # (e.g. /dev/roster/blue) and Mangum doesn't strip it, so FastAPI's
      # router 404s on every route.
      StageName: $default
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: ["GET", "POST", "OPTIONS"]
        AllowHeaders: ["content-type"]

  SessionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH

Outputs:
  ApiUrl:
    Description: Base URL for the Underdog Coach API
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  SessionTableName:
    Description: DynamoDB table storing per-session coaching progress
    Value: !Ref SessionTable
